{% set name = "optimagic" %}
{% set version = "0.5.3" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/optimagic-{{ version }}.tar.gz
  sha256: 1489f51843efb43897c6a281f4ccc2e816d0c00ee6288a58f1039348bf30d07d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >={{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
    - toml
  run:
    - python >={{ python_min }}
    - cloudpickle
    - joblib
    - numpy <3.0
    - pandas
    - plotly
    - pybaum >=0.1.2
    - scipy >=1.2.1
    - sqlalchemy >=1.3
    - annotated-types
    - typing-extensions
    - jinja2

test:
  imports:
    - optimagic
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/OpenSourceEconomics/optimagic
  summary: Tools to solve difficult numerical optimization problems.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - janosg
    - timmens
